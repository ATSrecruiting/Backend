name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: EC2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ats-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # --- Deployment Script on EC2 ---
            IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/ats-backend:latest"
            CONTAINER_NAME="atsBackend"
            ENV_FILE_PATH="/home/${{ secrets.EC2_USERNAME }}/app.env"
            NETWORK_NAME="AtsNetwork"

            echo "--- Ensuring Docker network exists ---"
            sudo docker network inspect $NETWORK_NAME >/dev/null 2>&1 || \
              sudo docker network create $NETWORK_NAME

            echo "--- Logging into Docker Hub on EC2 ---"
            echo ${{ secrets.DOCKERHUB_TOKEN }} | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            echo "--- Stopping existing container ---"
            sudo docker stop $CONTAINER_NAME || true
            sudo docker rm $CONTAINER_NAME || true

            echo "--- Pulling latest image ---"
            sudo docker pull $IMAGE_NAME

            echo "--- Creating environment file ---"
            cat <<EOF | sudo tee $ENV_FILE_PATH > /dev/null
            ${{ secrets.ENV_CONTENT }}
            EOF
            sudo chmod 600 $ENV_FILE_PATH

            echo "--- Running new container ---"
            sudo docker run -d \
              -p 8000:8000 \
              --name $CONTAINER_NAME \
              --network $NETWORK_NAME \
              --env-file $ENV_FILE_PATH \
              $IMAGE_NAME

            echo "--- Deployment complete ---"
            sudo docker image prune -f